version: "3.9"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro

  cv_service:
    build:
      context: .
      dockerfile: infra/Dockerfile
    command: python -m services.cv_service.main
    env_file:
      - .env
    volumes:
      - ./data/processed:/app/data/processed
      - ./data/raw_videos:/app/data/raw_videos
    depends_on:
      - kafka

  analytics_service:
    build:
      context: .
      dockerfile: infra/Dockerfile
    command: python -m services.analytics_service.main
    env_file:
      - .env
    depends_on:
      - kafka
      - postgres

  ui_service:
    build:
      context: .
      dockerfile: infra/Dockerfile
    command: streamlit run services/ui_service/app.py --server.port=8501 --server.address=0.0.0.0
    env_file:
      - .env
    volumes:
      - ./data/processed:/app/data/processed
    ports:
      - "8501:8501"
    depends_on:
      - postgres

volumes:
  pg_data:
