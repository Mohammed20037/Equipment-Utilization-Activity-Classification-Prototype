services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc -w 2 localhost 2181 | grep Mode || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 40s
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 40s
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped

  cv_service:
    build:
      context: .
      dockerfile: infra/Dockerfile
    command: python -m services.cv_service.main
    env_file:
      - .env
    volumes:
      - ./data/processed:/app/data/processed
      - ./data/raw_videos:/app/data/raw_videos
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  analytics_service:
    build:
      context: .
      dockerfile: infra/Dockerfile
    command: python -m services.analytics_service.main
    env_file:
      - .env
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  ui_service:
    build:
      context: .
      dockerfile: infra/Dockerfile
    command: streamlit run services/ui_service/app.py --server.port=8501 --server.address=0.0.0.0
    env_file:
      - .env
    volumes:
      - ./data/processed:/app/data/processed
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  training_service:
    build:
      context: .
      dockerfile: infra/Dockerfile.training
    env_file:
      - .env
    environment:
      # Override in .env or pass via CLI:  docker compose run training_service --model yolov8m
      ROBOFLOW_API_KEY: ${ROBOFLOW_API_KEY:-}
      ROBOFLOW_WORKSPACE: ${ROBOFLOW_WORKSPACE:-construction-equipment-site}
      ROBOFLOW_PROJECT: ${ROBOFLOW_PROJECT:-construction-equipment-detection}
      ROBOFLOW_VERSION: ${ROBOFLOW_VERSION:-1}
      TRAINING_EPOCHS: ${TRAINING_EPOCHS:-100}
      TRAINING_BATCH_SIZE: ${TRAINING_BATCH_SIZE:--1}
      TRAINING_IMG_SIZE: ${TRAINING_IMG_SIZE:-640}
      TRAINING_DEVICE: ${TRAINING_DEVICE:-}
      TRAINING_PATIENCE: ${TRAINING_PATIENCE:-20}
      MAX_IMAGES_PER_SOURCE: ${MAX_IMAGES_PER_SOURCE:-3000}
    volumes:
      - ./models:/app/models          # trained model output
      - ./data/training:/app/data/training  # downloaded datasets (cached)
      - ./runs:/app/runs              # TensorBoard / training logs
    # One-shot job: exits after training completes
    restart: "no"
    profiles:
      - training

volumes:
  pg_data:
